name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Build all platforms
        run: |
          go mod tidy
          mkdir -p dist
          PLATFORMS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64"
          for p in $PLATFORMS; do
            GOOS="${p%%/*}"
            GOARCH="${p##*/}"
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build \
              -ldflags "-s -w -X main.version=${{ env.VERSION }}" \
              -o "dist/ghs-${GOOS}-${GOARCH}${EXT}" .
            echo "Built ghs-${GOOS}-${GOARCH}${EXT}"
          done

      - name: Package Windows
        run: |
          for arch in amd64 arm64; do
            cd dist
            mkdir -p ghs-windows-${arch}
            cp ghs-windows-${arch}.exe ghs-windows-${arch}/ghs.exe
            cp ../install.bat ../install-ghs.ps1 ../uninstall.bat ghs-windows-${arch}/
            zip -r ghs-windows-${arch}.zip ghs-windows-${arch}/
            rm -rf ghs-windows-${arch} ghs-windows-${arch}.exe
            cd ..
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
