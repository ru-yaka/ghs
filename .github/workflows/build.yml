name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: .exe
          - goos: windows
            goarch: arm64
            suffix: .exe
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o ghs${{ matrix.suffix }} .

      - name: Package Windows zip
        if: matrix.goos == 'windows'
        run: |
          mkdir -p ghs-windows-${{ matrix.goarch }}
          cp ghs.exe ghs-windows-${{ matrix.goarch }}/
          cp install.bat install-ghs.ps1 uninstall.bat ghs-windows-${{ matrix.goarch }}/
          cd ghs-windows-${{ matrix.goarch }} && zip ../ghs-windows-${{ matrix.goarch }}.zip *

      - uses: actions/upload-artifact@v4
        if: matrix.goos != 'windows'
        with:
          name: ghs-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ghs${{ matrix.suffix }}

      - uses: actions/upload-artifact@v4
        if: matrix.goos == 'windows'
        with:
          name: ghs-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ghs-windows-${{ matrix.goarch }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
